[build-system]
requires = ["setuptools>=69", "wheel", "supy"]
build-backend = "setuptools.build_meta"

[project]
name = "suews-mcp"
dynamic = ["version"]
description = "MCP server for conversational SUEWS discovery and simulation"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "GPL-3.0-or-later" }
authors = [
  { name = "SUEWS Developers" }
]
dependencies = [
  "mcp>=1.2",
  "supy",
]
keywords = ["mcp", "suews", "urban-climate", "model-context-protocol"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering",
]

[project.urls]
Homepage = "https://github.com/UMEP-dev/SUEWS"
Documentation = "https://suews.readthedocs.io/"
Repository = "https://github.com/UMEP-dev/SUEWS"

[project.optional-dependencies]
simulation = [
  "pyarrow>=20",
]
dev = [
  "pytest>=8.0",
]

[project.scripts]
suews-mcp = "suews_mcp.server:main"

[tool.setuptools.dynamic]
version = { attr = "suews_mcp.__version__" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
suews_mcp = [
  "knowledge/*.md",
  "data/*.json",
]
"suews_mcp.source" = [
  "*.f95",
]
