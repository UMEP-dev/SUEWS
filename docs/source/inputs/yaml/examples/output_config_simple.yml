# Example: Simple output configuration (defaults)
# Omitting the `output:` block applies SUEWS defaults: txt format,
# hourly frequency, and the SUEWS + DailyState groups.

model:
  control:
    tstep: 300  # 5-minute timestep
    forcing:
      file: "forcing_2020.txt"

    # Default output configuration (no `output:` block needed):
    # - format: txt (traditional text files)
    # - freq: 3600 (hourly output regardless of timestep)
    # - groups: ["SUEWS", "DailyState"] (only these two groups are saved)
    # - dir: current working directory

  physics:
    netradiationmethod: 3
    emissionsmethod: 2

sites:
  - name: "Urban_Site"
    latitude: 51.5
    longitude: -0.1
    # ... other site parameters