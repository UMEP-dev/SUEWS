name: Rust clippy

# Lint the Rust bridge (src/suews_bridge/) with cargo clippy.
#
# Motivation: .claude/rules/rust/conventions.md notes that clippy is run only
# locally and "nothing in CI or the Makefile currently runs clippy, so it is
# not an automated gate." Python (ruff) and Fortran (fprettify) both have one;
# the ~34k-line Rust bridge did not. This workflow closes that gap.
#
# Feature/toolchain notes:
#   - The crate's default feature set is empty (Cargo.toml `default = []`), so
#     the FFI and physics-gated code (`#[cfg(feature = "physics")]`) is only
#     type-checked under `--all-features`. We therefore lint with --all-features
#     and install gfortran, because the `physics` feature makes build.rs compile
#     the Fortran C API via gfortran -- mirroring `make bridge` / maturin builds.
#   - We use the runner's preinstalled rustup (no third-party Rust action) so
#     this workflow needs no SHA-pinned action beyond actions/checkout, keeping
#     it clean against workflow-security.yml's SHA-pinning gate.
#
# FIRST-RUN CAVEAT: the bridge has never been clippy-gated, so the first run on
# an existing branch may surface a backlog (notably `too_many_arguments`, >7
# args). Run `cargo clippy --manifest-path src/suews_bridge/Cargo.toml \
# --all-features --all-targets -- -D warnings` locally to size it. If the
# backlog is large, either land a preparatory clean-up PR first, or temporarily
# switch this gate to report-only (see the commented variant in the lint step).
#
# Maintainers can label a PR `0-ci:clippy-ok` to bypass when a flagged lint is
# genuinely a false positive that is better suppressed inline in a follow-up.

on:
  pull_request:
    # labeled/unlabeled so adding the bypass label after a failed run re-triggers
    # the gate (same rationale as encoding-audit.yml).
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'src/suews_bridge/**'
      - '.github/workflows/rust-clippy.yml'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: rust-clippy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  clippy:
    name: cargo clippy (suews_bridge)
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to skip (PR has bypass label)
        id: bypass
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -eu
          echo "Labels on this PR: $LABELS"
          if printf '%s' "$LABELS" | grep -q '"0-ci:clippy-ok"'; then
            echo "bypass=true" >> "$GITHUB_OUTPUT"
            echo "PR carries label '0-ci:clippy-ok'; skipping clippy gate."
          else
            echo "bypass=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.bypass.outputs.bypass != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          # Full history so build.rs's `git describe --tags` version detection
          # resolves the same way a normal bridge build does.
          fetch-depth: 0

      - name: Install gfortran (build.rs compiles the Fortran C API under `physics`)
        if: steps.bypass.outputs.bypass != 'true'
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y gfortran

      - name: Add clippy component
        if: steps.bypass.outputs.bypass != 'true'
        run: |
          set -eu
          rustup component add clippy
          rustc --version
          cargo clippy --version

      - name: Run clippy (deny warnings)
        if: steps.bypass.outputs.bypass != 'true'
        run: |
          set -eu
          if ! cargo clippy \
                --manifest-path src/suews_bridge/Cargo.toml \
                --all-features --all-targets \
                -- -D warnings; then
            echo "::error::cargo clippy reported warnings/errors in src/suews_bridge/."
            echo "Reproduce locally:"
            echo "    cargo clippy --manifest-path src/suews_bridge/Cargo.toml --all-features --all-targets -- -D warnings"
            echo "See .claude/rules/rust/conventions.md. Maintainers may bypass with the '0-ci:clippy-ok' label."
            exit 1
          fi
          # --- Report-only variant (non-blocking) -------------------------------
          # If the initial backlog is too large to fix in one PR, comment out the
          # block above and use this instead until the backlog is cleared:
          #
          # cargo clippy --manifest-path src/suews_bridge/Cargo.toml \
          #   --all-features --all-targets || \
          #   echo "::warning::clippy reported issues (report-only mode)."
          # ----------------------------------------------------------------------
