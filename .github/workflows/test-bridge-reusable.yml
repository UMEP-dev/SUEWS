# Reusable workflow: install the cp39-abi3 wheel into each supported CPython
# version and exercise the FFI boundary with `pytest -m smoke_bridge`.
#
# Called by build-publish_to_pypi.yml. Catches stable-ABI regressions across
# cp39..cp3xx that the collapsed build matrix no longer sees. By isolating
# the matrix here, the caller job shows a single static name that groups
# cleanly in the Actions UI (mirroring the build-wheels-reusable pattern).

name: Bridge load (reusable)

on:
  workflow_call:
    inputs:
      buildplat_json:
        description: 'JSON array of [runner, platform_name, arch] triples'
        required: true
        type: string
      test_python_json:
        description: 'JSON array of test-time CPython tags (e.g. ["cp39","cp314"])'
        required: true
        type: string

permissions:
  contents: read

jobs:
  bridge_load:
    name: ${{ matrix.python_version }}-${{ matrix.buildplat[1] }} ${{ matrix.buildplat[2] }}
    runs-on: ${{ matrix.buildplat[0] }}
    strategy:
      fail-fast: false
      matrix:
        buildplat: ${{ fromJson(inputs.buildplat_json) }}
        python_version: ${{ fromJson(inputs.test_python_json) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Resolve Python version (cp39 -> 3.9)
        id: pyver
        shell: bash
        env:
          PV: ${{ matrix.python_version }}
        run: |
          echo "spec=3.${PV#cp3}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ steps.pyver.outputs.spec }}

      - name: Download wheel for this platform
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: cp39-${{ matrix.buildplat[1] }}-${{ matrix.buildplat[2] }}
          path: wheelhouse/

      - name: Install wheel and run bridge-load smoke tests
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install wheelhouse/*.whl
          python -m pytest test -m smoke_bridge -v --tb=short
