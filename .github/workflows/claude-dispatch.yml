# IMPORTANT: Do not move this file in your repo! Make sure it's located at .github/workflows/claude-dispatch.yml

name: Claude Code Dispatch

# IMPORTANT: Do not modify this `on` section!

on:
  repository_dispatch:
    types: [claude-dispatch]

jobs:
  claude-dispatch:
    runs-on: ubuntu-latest
    environment: claude-code-dispatch
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 1
        persist-credentials: false

    # - name: Preliminary Setup
    #   run: |
    #     echo "Setting up environment..."
    #     # Add any preliminary setup commands here to setup Claude's dev environment
    #     # e.g., npm install, etc.

    - name: Run Claude Code
      id: claude
      uses: anthropics/claude-code-action@9278e593553fcd1b65eede335d8c7e7e80da92db # eap branch head on 2026-03-24
      with:
        mode: 'remote-agent'
        # Optional: Specify an API key, otherwise we'll use your Claude account automatically
        # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

        # Optional: Specify model (defaults to Claude Sonnet 4, uncomment for Claude Opus 4)
        # model: "claude-opus-4-20250514"

        # Optional: Allow Claude to run specific commands
        # allowed_tools: |
        #   Bash(npm run lint)
        #   Bash(npm run test)
        #   Bash(npm run build)

        # Optional: Custom environment variables for Claude
        # claude_env: |
        #   NODE_ENV: test
